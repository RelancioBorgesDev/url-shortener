auth_enabled: false

server:
  http_listen_address: 0.0.0.0
  http_listen_port: 3101

memberlist:
  join_members: ["loki"]
  bind_addr: [0.0.0.0]
  bind_port: 7946

schema_config:
  configs:
    - from: 2025-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  discover_log_levels: true

common:
  path_prefix: /loki
  replication_factor: 1
  compactor_address: http://loki:3101
