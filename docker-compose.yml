services:
  postgres:
    container_name: url-pg-db
    image: bitnami/postgresql:latest
    ports:
      - "5482:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/bitnami/postgresql

  url-shortener:
    build: .
    container_name: url-shortener
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3333
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.shortener.rule=Host(`sho.rt`)"
      - "traefik.http.routers.shortener.entrypoints=web"
      - "traefik.http.services.shortener.loadbalancer.server.port=3333"
      # - "traefik.http.routers.shortener.entrypoints=websecure"
      # - "traefik.http.routers.shortener.tls.certresolver=myresolver"
    networks:
      - url-shortcut_default

  traefik:
    image: traefik:v3.1.5
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Painel do Traefik (http://localhost:8080)
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./config/traefik.yml:/etc/traefik/traefik.yml"
    networks:
      - url-shortcut_default

  collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: collector
    volumes:
      - ./config/otel-collector-config.yml:/etc/otel-collector-config.yml
    command: ["--config", "/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888" #prometheus-collector
      - "8889:8889" #prometheus-exporter
      - "1888:1888" #pprof
      - "13133:13133" #healthcheck
      - "55679:55679" #zpages
    networks:
      - url-shortcut_default

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: always
    command: ["-config.file=/etc/loki.yml", "-config.expand-env=true"]
    volumes:
      - ./config/loki.yml:/etc/loki.yml
    ports:
      - 3101:3101
      - 7946
      - 9095
    networks:
      - url-shortcut_default

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - 3200:3200
      - 54317:54317
      - 54318:54318
    restart: always
    volumes:
      - ./config/tempo.yml:/etc/tempo.yml
    networks:
      - url-shortcut_default

  mimir:
    image: grafana/mimir:latest
    container_name: mimir
    restart: always
    ports:
      - 9008:9008
      - 9009:9009
    command: ["-config.file=/etc/mimir.yml"]
    volumes:
      - ./config/mimir.yml:/etc/mimir.yml
    networks:
      - url-shortcut_default

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - url-shortcut_default

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    user: "472"
    ports:
      - 3000:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./config/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_FORM_LOGIN=true
      - GF_SECURITY_ALLOW_EMBEDDING=true
    depends_on:
      - loki
      - prometheus
      - tempo
      - mimir
    networks:
      - url-shortcut_default

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/log:/var/log
      - ./config/promtail.yml:/etc/promtail/config.yml
    command: ["-config.file=/etc/promtail/config.yml"]
    networks:
      - url-shortcut_default

networks:
  url-shortcut_default:
    external: true

volumes:
  postgres_data:
  grafana_data:
