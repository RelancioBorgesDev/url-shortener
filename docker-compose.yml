version: "3.9"

services:
  postgres:
    container_name: url-pg-db
    image: bitnami/postgresql:latest
    ports:
      - "5482:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/bitnami/postgresql

  url-shortener:
    build: .
    container_name: url-shortener
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3333
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.shortener.rule=Host(`sho.rt`)"
      - "traefik.http.routers.shortener.entrypoints=web"
      - "traefik.http.services.shortener.loadbalancer.server.port=3333"
      # - "traefik.http.routers.shortener.entrypoints=websecure"
      # - "traefik.http.routers.shortener.tls.certresolver=myresolver"

  traefik:
    image: traefik:v3.1.5
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Painel do Traefik (http://localhost:8080)
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./config/traefik.yml:/etc/traefik/traefik.yml"
    networks:
      - url-shortcut_default

networks:
  url-shortcut_default:
    external: true

volumes:
  postgres_data:
